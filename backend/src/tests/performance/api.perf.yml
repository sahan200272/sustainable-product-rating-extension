config:
  # Base URL with environments setup to handle Dev/Prod seamlessly (Academic Best Practice)
  target: "http://localhost:3000"
  
  environments:
    dev:
      target: "http://localhost:3000"
    prod:
      target: "https://api.yourdomain.com" # Placeholder for production target

  phases:
    # Phase 1 - Warm up: Allows the Node.js event loop and DB connection pool to stabilize
    - duration: 30
      arrivalRate: 5
      name: "Warm up (light load)"

    # Phase 2 - Ramp up: Gradually increases traffic to test dynamic scaling
    - duration: 60
      arrivalRate: 5
      rampTo: 20
      name: "Ramp up load"

    # Phase 3 - Peak load: Sustains high traffic to analyze maximum stable throughput
    - duration: 60
      arrivalRate: 20
      name: "Peak load"

    # Phase 4 - Stress test: Pushes the system to its limit to observe degradation & recovery
    - duration: 30
      arrivalRate: 50
      name: "Stress test (maximum load)"

  # Thresholds - Automated PASS/FAIL assertions (Crucial for CI/CD and evaluation marking)
  ensure:
    p95: 1500           # 95% of requests MUST complete under 1.5 seconds under load
    p99: 3000           # 99% of requests MUST complete under 3 seconds under load
    maxErrorRate: 1     # Testing FAILS if the error rate exceeds 1% (Availablity Target)

scenarios:
  # Scenario 1 - Realistic User Browsing Flow (Incorporates "think time" between actions)
  - name: "Flow: Browse Products and Read Blogs"
    weight: 40
    flow:
      - get:
          url: "/api/products"
          expect:
            - statusCode: 200
      - think: 2  # Simulates human behavior: user spends 2 seconds reading product list
      
      - get:
          url: "/api/products/search?name=eco"
          expect:
            - statusCode: 200
      - think: 3  # User reviews search results before navigating to blogs
      
      - get:
          url: "/api/blogs"
          expect:
            - statusCode: 200

  # Scenario 2 - User Login Stress
  - name: "Flow: User Authentication"
    weight: 20
    flow:
      - post:
          url: "/api/users/login"
          json:
            email: "testuser@test.com"
            password: "test123456"
          expect:
            - statusCode: 200 # Ensures authentication handles concurrent stress correctly

  # Scenario 3 - Comprehensive Reviews and Feedback Management Flow
  - name: "Flow: Read Reviews and Compare"
    weight: 40
    flow:
      # Step 1: User glances at recent global reviews
      - get:
          url: "/api/reviews/recent"
          expect:
            - statusCode: 200
      - think: 1  
      
      # Step 2: User clicks a specific product to see all of its associated approved reviews
      - get:
          # Note: Uses a mock standard 24-char hex MongoDB ObjectId for realistic routing overhead
          url: "/api/reviews/product/60d5ec496b1b2c001f6e2a2a" 
          expect:
            # We accept 200 (Success) or 404 (Not Found, since object ID doesn't exist).
            # The goal is testing router/controller throughput, not database seeding perfectly.
            - statusCode: [200, 404]
      - think: 2

      # Step 3: User performs a quick comparison between two products
      - get:
          url: "/api/comparisons/quick?product1=test&product2=test"
          expect:
            - statusCode: 200
